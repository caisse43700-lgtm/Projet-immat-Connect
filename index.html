<!DOCTYPE html>
<html>
<head>
  <title>ImmatConnect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      padding: 15px;
      color: #38bdf8;
    }

    #map {
      height: 500px;
      width: 100%;
    }

    button {
      margin: 10px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #38bdf8;
      color: black;
      font-size: 16px;
    }
  </style>
</head>

<body>

<h1>ImmatConnect</h1>

<button onclick="locateUser()">Me localiser</button>

<div id="map"></div>

<script>
  var map = L.map('map').setView([48.8566, 2.3522], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  var marker = null;

  function locateUser() {
    if (!navigator.geolocation) {
      alert("La géolocalisation n'est pas disponible sur cet appareil.");
      return;
    }

    navigator.geolocation.getCurrentPosition(
      function(position) {
        var lat = position.coords.latitude;
        var lng = position.coords.longitude;

        map.setView([lat, lng], 16);

        if (marker) {
          map.removeLayer(marker);
        }

        marker = L.marker([lat, lng]).addTo(map);
        marker.bindPopup("Tu es ici").openPopup();
      },
      function(error) {
        let message = "La localisation a échoué.";
        if (error.code === 1) message = "Tu as refusé la localisation.";
        if (error.code === 2) message = "Position introuvable.";
        if (error.code === 3) message = "La localisation a pris trop de temps.";
        alert(message);
      },
      {
        enableHighAccuracy: true,
        timeout: 15000,
        maximumAge: 0
      }
    );
  }
</script>

</body>
</html>

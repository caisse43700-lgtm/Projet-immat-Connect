<!DOCTYPE html>
<html>
<head>
  <title>ImmatConnect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    input {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      width: 80%;
    }

    button {
      padding: 12px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      background: #38bdf8;
      color: black;
      font-size: 16px;
    }

    #map {
      height: 500px;
      display: none;
    }
  </style>
</head>

<body>

<h1>ImmatConnect</h1>

<!-- LOGIN -->
<div id="login">
  <input type="email" id="email" placeholder="Ton email">
  <br>
  <button onclick="login()">Se connecter</button>
</div>

<!-- PROFIL -->
<div id="profile" style="display:none;">
  <input type="text" id="pseudo" placeholder="Pseudo">
  <input type="text" id="plaque" placeholder="Plaque">
  <br>
  <button onclick="saveProfile()">Continuer</button>
</div>

<!-- MAP -->
<div id="map"></div>
<button onclick="locateUser()" style="display:none;" id="locateBtn">Me localiser</button>

<script>
const supabase = window.supabase.createClient(
  "https://vemgdkkbldgyvaisudkd.supabase.co",
  "sb_publishable_4MiqXFtJgg20xm4KaxE_2Q_IsMdI6gJ"
);

// LOGIN EMAIL
async function login() {
  const email = document.getElementById("email").value;

  await supabase.auth.signInWithOtp({
    email: email
  });

  alert("Vérifie ton email pour te connecter !");
}

// CHECK SESSION
supabase.auth.getSession().then(({ data }) => {
  if (data.session) {
    showProfile();
  }
});

// SHOW PROFILE
function showProfile() {
  document.getElementById("login").style.display = "none";
  document.getElementById("profile").style.display = "block";
}

// SAVE PROFILE
async function saveProfile() {
  const user = (await supabase.auth.getUser()).data.user;

  const pseudo = document.getElementById("pseudo").value;
  const plaque = document.getElementById("plaque").value;

  await supabase.from("profiles").insert({
    id: user.id,
    email: user.email,
    pseudo: pseudo,
    plaque: plaque
  });

  startMap();
}

// START MAP
function startMap() {
  document.getElementById("profile").style.display = "none";
  document.getElementById("map").style.display = "block";
  document.getElementById("locateBtn").style.display = "block";

  window.map = L.map('map').setView([48.8566, 2.3522], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);
}

// GEOLOC
function locateUser() {
  map.locate({ setView: true, maxZoom: 16 });
}

// LOCATION FOUND
map?.on?.('locationfound', async function(e) {
  L.marker(e.latlng).addTo(map)
    .bindPopup("Tu es ici")
    .openPopup();

  const user = (await supabase.auth.getUser()).data.user;

  await supabase.from("user_locations").insert({
    user_name: user.email,
    latitude: e.latlng.lat,
    longitude: e.latlng.lng
  });
});

// ERROR
map?.on?.('locationerror', function() {
  alert("Active la localisation dans Safari");
});
</script>

</body>
</html>

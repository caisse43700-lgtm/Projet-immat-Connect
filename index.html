<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Immaticonnect</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#020817;
    color:white;
    padding:20px;
}

.container{
    max-width:430px;
    margin:auto;
}

.card{
    background:#0f172a;
    border:1px solid #1e293b;
    border-radius:28px;
    padding:24px;
    margin-bottom:24px;
    box-shadow:0 0 20px rgba(0,0,0,.25);
}

h2{
    color:#94a3b8;
    letter-spacing:2px;
    font-size:22px;
    margin-bottom:22px;
    text-transform:uppercase;
}

input,
select,
textarea{
    width:100%;
    background:#020617;
    border:1px solid #22304a;
    color:white;
    padding:18px;
    border-radius:18px;
    margin-bottom:18px;
    font-size:16px;
}

textarea{
    min-height:120px;
    resize:none;
}

button{
    background:#10f0b0;
    border:none;
    color:black;
    font-weight:bold;
    padding:16px 28px;
    border-radius:18px;
    font-size:18px;
    cursor:pointer;
}

.quick-actions{
    display:flex;
    flex-wrap:wrap;
    gap:14px;
}

.quick-actions button{
    flex:1;
    min-width:140px;
}

.map{
    height:260px;
    border-radius:22px;
    border:1px solid #22304a;
    background:#071126;
}

.footer{
    text-align:center;
    color:#64748b;
    margin-top:30px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

    <div class="card">
        <h2>Connexion</h2>

        <input type="email" placeholder="Email">
        <input type="password" placeholder="Mot de passe">

        <button>Connexion</button>
    </div>

    <div class="card">
        <h2>Profil conducteur</h2>

        <input type="text" placeholder="Pseudo">
        <input type="text" placeholder="AB-123-CD">
        <input type="tel" placeholder="0612345678">

        <select>
            <option>Choisir un véhicule</option>
            <option>Citadine</option>
            <option>SUV</option>
            <option>Utilitaire</option>
        </select>

        <button>Enregistrer</button>
    </div>

    <div class="card">
        <h2>Carte temps réel</h2>
        <div class="map"></div>
    </div>

    <div class="card">
        <h2>Messagerie plaque</h2>

        <input type="text" placeholder="Plaque cible">
        <textarea placeholder="Votre message"></textarea>

        <button>Envoyer</button>
    </div>

    <div class="card">
        <h2>Actions rapides</h2>

        <div class="quick-actions">
            <button>🚨 Signalement</button>
            <button>🚗 Mode conduite</button>
            <button>👻 Invisible</button>
        </div>
    </div>

    <div class="footer">
        Immaticonnect © 2026
    </div>

</div>

</body>
</html>

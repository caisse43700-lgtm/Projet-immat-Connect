const RE_PH = /^0\d{9}$/;
const RE_PL = /^[A-Z]{2}-\d{3}-[A-Z]{2}$/;
const vPhone = v => RE_PH.test(String(v || '').replace(/\s/g, ''));
const vPlate = v => RE_PL.test(String(v || '').trim().toUpperCase());
const sPwd = v => String(v || '').length >= 8 && /[A-Z]/.test(v) && /[^A-Za-z0-9]/.test(v);
const nPlate = v => String(v || '').trim().toUpperCase().replace(/[^A-Z0-9-]/g, '');
const nPhone = v => String(v || '').replace(/\D/g, '');

function fPlate(r) {
  const s = String(r || '').toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 7);
  if (s.length <= 2) return s;
  if (s.length <= 5) return s.slice(0, 2) + '-' + s.slice(2);
  return s.slice(0, 2) + '-' + s.slice(2, 5) + '-' + s.slice(5);
}

function fPhone(r) {
  return String(r || '').replace(/\D/g, '').slice(0, 10);
}

function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function jsStr(s) {
  return String(s || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, '\\n').replace(/\r/g, '');
}

}

}

}

function beep() {
  try {
    if ('vibrate' in navigator) navigator.vibrate([80, 40, 80]);
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    const ctx = new AC();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.frequency.value = 880;
    gain.gain.value = 0.025;
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    setTimeout(() => {
      osc.stop();
      ctx.close();
    }, 120);
  } catch (e) {}
}

function xlErr(m) {
  const s = String(m || '').toLowerCase();
  if (s.includes('invalid login credentials')) return 'Email ou mot de passe incorrect.';
  if (s.includes('email not confirmed')) return 'Email non confirmé. Vérifie ta boîte mail.';
  if (s.includes('user already registered')) return 'Un compte existe déjà avec cet email.';
  if (s.includes('rate limit')) return 'Trop de tentatives. Réessaie plus tard.';
  if (s.includes('password should')) return 'Le mot de passe ne respecte pas les critères.';
  if (s.includes('same password')) return 'Le nouveau mot de passe doit être différent.';
  if (s.includes('network') || s.includes('fetch')) return 'Erreur réseau. Vérifie ta connexion.';
  return 'Une erreur est survenue. Réessaie.';
}

function km(aLat, aLng, bLat, bLng) {
  const R = 6371;
  const dLat = (bLat - aLat) * Math.PI / 180;
  const dLng = (bLng - aLng) * Math.PI / 180;
  const x =
    Math.sin(dLat / 2) ** 2 +
    Math.cos(aLat * Math.PI / 180) *
    Math.cos(bLat * Math.PI / 180) *
    Math.sin(dLng / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
}

function relTime(iso) {
  if (!iso) return 'inconnu';
  const diff = Date.now() - new Date(iso).getTime();
  const min = Math.max(0, Math.round(diff / 60000));
  if (min < 1) return 'à l’instant';
  if (min === 1) return 'il y a 1 min';
  return 'il y a ' + min + ' min';
}

function canSendNow() {
  const now = Date.now();
  S.msgClicks = S.msgClicks.filter(t => now - t < 60000);
  if (S.msgClicks.length >= CFG.maxMsgPerMinute) return false;
  S.msgClicks.push(now);
  return true;
}

function bindInputs() {
  [['iPhone', 'hPhone'], ['iProPhone', 'hProPhone']].forEach(([i, h]) => {
    const e = document.getElementById(i);
    if (!e) return;
    e.addEventListener('input', () => {
      e.value = fPhone(e.value);
      const v = e.value.trim();
      if (!v) {
        mi(i);
        hint(h, '', '');
        return;
      }
      const ok = vPhone(v);
      mi(i, ok);
      hint(h, ok ? 'ok' : 'err', ok ? '✓ Format valide' : 'Format attendu : 0612345678');
    });
  });

  [['iPlate', 'hPlate'], ['iProPlate', 'hProPlate'], ['iTarget', 'hTarget']].forEach(([i, h]) => {
    const e = document.getElementById(i);
    if (!e) return;
    e.addEventListener('input', () => {
      e.value = fPlate(e.value);

      if (!v) {

      hint(h, ok ? 'ok' : 'err', ok ? '✓ Format valide' : 'Format attendu : AB-123-CD');
    });
  });
}

function installPwa() {
  try {
    const manifest = {
      name: 'ImmatConnect',
      short_name: 'ImmatConnect',
      start_url: CFG.site,
      display: 'standalone',
      background_color: '#080b12',
      theme_color: '#00ffb3',
      icons: []
    };
    const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('link');
    link.rel = 'manifest';
    link.href = url;
    document.head.appendChild(link);

    const meta = document.createElement('meta');
    meta.name = 'theme-color';
    meta.content = '#00ffb3';
    document.head.appendChild(meta);
  } catch (e) {}
}

const App = {
  goToAuth(m) {
    App.setMode(m);
    show('sa');
  },

  backToWelcome() {
    show('sw');
    setSt('authSt', '');
  },

  setMode(m) {
    S.mode = m === 'signup' ? 'signup' : 'login';
    const su = S.mode === 'signup';

    document.getElementById('authTitle').textContent = su ? 'Créer un compte' : 'Connexion';
    document.getElementById('authSub').textContent = su ? 'Crée ton compte en quelques secondes.' : 'Connecte-toi avec ton email et mot de passe.';
    document.getElementById('authBtn').textContent = su ? 'Créer mon compte' : 'Se connecter';
    document.getElementById('tabSignup').classList.toggle('on', su);
    document.getElementById('tabLogin').classList.toggle('on', !su);
    document.getElementById('suExtras').classList.toggle('hidden', !su);
    document.getElementById('confirmWrap').classList.toggle('hidden', !su);
    document.getElementById('resendBtn').classList.toggle('hidden', !su);

    setSt('authSt', '');
    ch('hEmail', 'hPhone', 'hPlate', 'hPwd', 'hConfirm');

    ['iEmail', 'iPhone', 'iPlate', 'iPwd', 'iConfirm'].forEach(id => {
      mi(id, undefined);
      const e = document.getElementById(id);
      if (e) e.value = '';
    });
  },

  async handleAuth() {
    setSt('authSt', '');
    ch('hEmail', 'hPhone', 'hPlate', 'hPwd', 'hConfirm');

    const email = document.getElementById('iEmail').value.trim();
    const pwd = document.getElementById('iPwd').value;

    if (!email) {
      hint('hEmail', 'err', 'Requis.');
      return;
    }

    if (!pwd) {
      hint('hPwd', 'err', 'Requis.');
      return;
    }

    const btn = document.getElementById('authBtn');
    const idle = S.mode === 'signup' ? 'Créer mon compte' : 'Se connecter';
    btn.disabled = true;
    btn.textContent = S.mode === 'signup' ? 'Création…' : 'Connexion…';

    try {
      if (S.mode === 'signup') await App._signup(email, pwd);
      else await App._login(email, pwd);
    } catch (e) {
      console.error(e);
      setSt('authSt', 'Erreur inattendue : ' + String(e?.message || ''), 'err');
    } finally {
      btn.disabled = false;
      btn.textContent = idle;
    }
  },

  async plateAvailable(plate, selfId) {
    const { data, error } = await sb.from('profiles').select('id').eq('owner_plate', plate).maybeSingle();
    if (error) return true;
    if (!data?.id) return true;
    return data.id === selfId;
  },

  async _signup(email, pwd) {
    const phoneRaw = document.getElementById('iPhone').value.trim();
    const plateRaw = document.getElementById('iPlate').value.trim();
    const confirm = document.getElementById('iConfirm').value;
    let fail = false;

    if (!phoneRaw) {
      hint('hPhone', 'err', 'Requis.');
      fail = true;
    } else if (!vPhone(phoneRaw)) {
      hint('hPhone', 'err', 'Format : 0612345678');
      fail = true;
    }

    if (!plateRaw) {
      hint('hPlate', 'err', 'Requis.');
      fail = true;
    } else if (!vPlate(nPlate(plateRaw))) {
      hint('hPlate', 'err', 'Format : AB-123-CD');
      fail = true;
    }

    if (!sPwd(pwd)) {
      hint('hPwd', 'err', 'Min. 8 car., 1 maj., 1 spécial.');
      fail = true;
    }

    if (!confirm) {
      hint('hConfirm', 'err', 'Requis.');
      fail = true;
    } else if (pwd !== confirm) {
      hint('hConfirm', 'err', 'Les mots de passe ne correspondent pas.');
      fail = true;
    }

    if (fail) return;

    const phone = nPhone(phoneRaw);
    const plate = nPlate(plateRaw);

    const available = await App.plateAvailable(plate, null);
    if (!available) {
      hint('hPlate', 'err', 'Cette plaque est déjà utilisée.');
      return;
    }

    const { data, error } = await sb.auth.signUp({
      email,
      password: pwd,
      options: { emailRedirectTo: CFG.site }
    });

    if (error) {
      setSt('authSt', xlErr(error.message), 'err');
      return;
    }

    const user = data?.user;
    if (user) {
      await sb.from('profiles').upsert({
        id: user.id,
        email,
        pseudo: email.split('@')[0],
        owner_plate: plate,
        phone
      });
    }

    setSt('authSt', '✅ Compte créé ! Vérifie ton email puis connecte-toi.', 'ok');
  },

  async _login(email, pwd) {
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pwd });

    if (error) {
      setSt('authSt', xlErr(error.message), 'err');
      return;
    }

    const user = data?.user;

    if (!user) {
      setSt('authSt', 'Aucun utilisateur retourné. Réessaie.', 'err');
      return;
    }

    S.uid = user.id;
    S.sessionDone = true;
    await App._afterAuth();
  },

  async resendConfirm() {
    const email = document.getElementById('iEmail').value.trim();

    if (!email) {
      hint('hEmail', 'err', 'Requis.');
      return;
    }

    sBtn('resendBtn', true, "Renvoyer l'email de confirmation");

    try {
      const { error } = await sb.auth.resend({
        type: 'signup',
        email,
        options: { emailRedirectTo: CFG.site }
      });

      if (error) {
        setSt('authSt', xlErr(error.message), 'err');
        return;
      }

      setSt('authSt', 'Email de confirmation renvoyé.', 'ok');
    } finally {
      sBtn('resendBtn', false, "Renvoyer l'email de confirmation");
    }
  },

  async forgotPwd() {
    const email = document.getElementById('iEmail').value.trim();

    if (!email) {
      hint('hEmail', 'err', 'Requis.');
      return;
    }

    sBtn('forgotBtn', true, 'Mot de passe oublié ?');

    try {
      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: CFG.site
      });

      if (error) {
        setSt('authSt', xlErr(error.message), 'err');
        return;
      }

      setSt('authSt', 'Email de réinitialisation envoyé.', 'ok');
    } finally {
      sBtn('forgotBtn', false, 'Mot de passe oublié ?');
    }
  },

  async updatePwd() {
    ch('hNewPwd', 'hNewCfm');
    setSt('resetSt', '');

    const pwd = document.getElementById('iNewPwd').value;
    const cfm = document.getElementById('iNewCfm').value;
    let fail = false;

    if (!sPwd(pwd)) {
      hint('hNewPwd', 'err', 'Min. 8 car., 1 maj., 1 spécial.');
      fail = true;
    }

    if (!cfm) {
      hint('hNewCfm', 'err', 'Requis.');
      fail = true;
    } else if (pwd !== cfm) {
      hint('hNewCfm', 'err', 'Les mots de passe ne correspondent pas.');
      fail = true;
    }

    if (fail) return;

    sBtn('updPwdBtn', true, 'Mettre à jour');

    try {
      const { error } = await sb.auth.updateUser({ password: pwd });

      if (error) {
        setSt('resetSt', xlErr(error.message), 'err');
        return;
      }

      setSt('resetSt', '✅ Mot de passe mis à jour !', 'ok');

      setTimeout(async () => {
        S.sessionDone = true;
        await App._afterAuth();
      }, 1400);
    } finally {
      sBtn('updPwdBtn', false, 'Mettre à jour');
    }
  },

  async _afterAuth() {
    const { data: ud, error: ue } = await sb.auth.getUser();

    if (ue || !ud?.user) {
      setSt('authSt', 'Session introuvable. Reconnecte-toi.', 'err');
      show('sa');
      return;
    }

    const user = ud.user;
    S.uid = user.id;

    const { data: prof } = await sb.from('profiles').select('*').eq('id', user.id).maybeSingle();

    if (prof) App._openMap(prof, user.email);
    else show('sp');
  },

  async saveProfile() {
    ch('hPseudo', 'hProPlate', 'hProPhone');
    setSt('profileSt', '');

    const pseudo = document.getElementById('iPseudo').value.trim();
    const plateRaw = document.getElementById('iProPlate').value.trim();
    const phoneRaw = document.getElementById('iProPhone').value.trim();

    let fail = false;

    if (!pseudo) {
      hint('hPseudo', 'err', 'Requis.');
      fail = true;
    }

    if (!plateRaw) {
      hint('hProPlate', 'err', 'Requis.');
      fail = true;
    } else if (!vPlate(nPlate(plateRaw))) {
      hint('hProPlate', 'err', 'Format : AB-123-CD');
      fail = true;
    }

    if (!phoneRaw) {
      hint('hProPhone', 'err', 'Requis.');
      fail = true;
    } else if (!vPhone(phoneRaw)) {
      hint('hProPhone', 'err', 'Format : 0612345678');
      fail = true;
    }

    if (fail) return;

    sBtn('saveBtn', true, 'Enregistrer et continuer →');

    try {
      const { data: ud } = await sb.auth.getUser();
      const user = ud?.user;

      if (!user) {
        setSt('profileSt', 'Session introuvable.', 'err');
        return;
      }

      S.uid = user.id;

      const plate = nPlate(plateRaw);
      const phone = nPhone(phoneRaw);

      const available = await App.plateAvailable(plate, user.id);
      if (!available) {
        hint('hProPlate', 'err', 'Cette plaque est déjà utilisée.');
        return;
      }

      const { error } = await sb.from('profiles').upsert({
        id: user.id,
        email: user.email,
        pseudo,
        owner_plate: plate,
        phone
      });

      if (error) {
        console.error(error);
        setSt('profileSt', "Erreur lors de l'enregistrement.", 'err');
        return;
      }

      App._openMap({ email: user.email, pseudo, owner_plate: plate }, user.email);
    } finally {
      sBtn('saveBtn', false, 'Enregistrer et continuer →');
    }
  },

  _openMap(profile, email) {
    S.currentProfile = profile || {};
    show('sm');
    injectExtraUi();

    document.getElementById('tbPlate').textContent = profile?.owner_plate || '';
    document.getElementById('tbPseudo').textContent = profile?.pseudo || email || '';

    setTimeout(() => {
      App._initMap();
      S.map.invalidateSize();
      if (!S.invisible) App.locate();
      else toast('Mode invisible activé : votre position n’est pas partagée.', 'ok');
    }, 300);

    App._startMsgs();
    App._subLocs();
  },

  _initMap() {
    if (S.map) return;

    S.map = L.map('map', {
      zoomControl: true,
      zoomSnap: 0,
      zoomDelta: 0.5,
      wheelPxPerZoomLevel: 120,
      preferCanvas: true
    }).setView([46.6, 1.9], 6);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>',
      maxZoom: 19
    }).addTo(S.map);
  },

  async deleteMyLocation() {
    try {
      const { data: ud } = await sb.auth.getUser();
      const user = ud?.user;
      if (!user) return;
      await sb.from('user_locations').delete().eq('id', user.id);
    } catch (e) {
      console.warn('delete location failed:', e);
    }
  },

  async toggleInvisible() {
    S.invisible = !S.invisible;
    localStorage.setItem('ic_invisible', S.invisible ? '1' : '0');
    App.refreshInvisibleBtn();

    if (S.invisible) {
      if (S.watchId !== null) {
        navigator.geolocation.clearWatch(S.watchId);
        S.watchId = null;
      }
      if (S.myMarker) {
        S.map.removeLayer(S.myMarker);
        S.myMarker = null;
      }
      await App.deleteMyLocation();
      toast('Mode invisible activé. Votre position a été retirée.', 'ok');
    } else {
      toast('Mode visible activé.', 'ok');
      App.locate();
    }
  },

  refreshInvisibleBtn() {
    const b = document.getElementById('invisBtn');
    if (!b) return;
    b.textContent = S.invisible ? '👁️ Redevenir visible' : '👻 Invisible';
    b.classList.toggle('abtn-g', S.invisible);
    b.classList.toggle('abtn-o', !S.invisible);
  },

  setRadius(v) {
    S.radiusKm = Number(v) || CFG.defaultRadiusKm;
    localStorage.setItem('ic_radius', String(S.radiusKm));
    App.loadOthers();
  },

  locate() {
    if (S.invisible) {
      toast('Mode invisible actif. Active le mode visible pour partager ta position.', 'bad');
      return;
    }

    if (!navigator.geolocation) {
      toast('Géolocalisation non disponible.', 'bad');
      return;
    }

    const btn = document.getElementById('locBtn');
    btn.disabled = true;
    btn.textContent = '⌛ Localisation…';

    App._initMap();

    if (S.watchId !== null) {
      navigator.geolocation.clearWatch(S.watchId);
      S.watchId = null;
      S.firstFix = true;
    }

    S.watchId = navigator.geolocation.watchPosition(
      async pos => {
        const { latitude: lat, longitude: lng } = pos.coords;

        S.myLat = lat;
        S.myLng = lng;

        btn.disabled = false;
        btn.textContent = '📍 Me localiser';

        if (S.firstFix) {
          S.map.flyTo([lat, lng], 16, { duration: 0.9 });
          S.firstFix = false;
        } else {
          S.map.setView([lat, lng], S.map.getZoom(), { animate: false });
        }

        if (S.myMarker) S.map.removeLayer(S.myMarker);
        S.myMarker = L.marker([lat, lng]).addTo(S.map).bindPopup('📍 Tu es ici').openPopup();

        const { data: ud } = await sb.auth.getUser();
        const user = ud?.user;

        if (!user || S.invisible) return;

        S.uid = user.id;

        await sb.from('user_locations').upsert({
          id: user.id,
          user_name: user.email,
          latitude: lat,
          longitude: lng,
          updated_at: new Date().toISOString()
        });
      },
      err => {
        btn.disabled = false;
        btn.textContent = '📍 Me localiser';

        const msgs = {
          1: 'Localisation refusée.',
          2: 'Position introuvable.',
          3: 'Délai dépassé.'
        };

        toast(msgs[err.code] || 'Erreur de géolocalisation.', 'bad');
      },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 5000 }
    );
  },

  async loadOthers() {
    if (S.loadingOthers) return;

    S.loadingOthers = true;

    const btn = document.getElementById('othersBtn');
    btn.disabled = true;
    btn.textContent = '⌛ Chargement…';

    App._initMap();

    S.otherMkrs.forEach(m => S.map.removeLayer(m));
    S.otherMkrs = [];

    try {
      const { data: ud } = await sb.auth.getUser();
      const me = ud?.user;

      if (me) S.uid = me.id;

      const cutoff = new Date(Date.now() - CFG.staleMinutes * 60000).toISOString();

      let locQ = sb.from('user_locations').select('id,latitude,longitude,updated_at').gte('updated_at', cutoff);
      if (me) locQ = locQ.neq('id', me.id);

      const { data: locs, error: le } = await locQ;

      if (le) {
        console.error('user_locations:', le);
        toast('Erreur positions : ' + le.message, 'bad');
        return;
      }

      if (!locs?.length) {
        toast('Aucun conducteur récent dans le rayon.');
        return;
      }

      const ids = locs.map(l => l.id);
      const { data: profiles, error: pe } = await sb.from('profiles').select('id,pseudo,owner_plate').in('id', ids);

      if (pe) console.warn('profiles fetch warn:', pe);

      const pMap = {};
      (profiles || []).forEach(p => pMap[p.id] = p);

      let shown = 0;

      locs.forEach(loc => {
        const lat = Number(loc.latitude);
        const lng = Number(loc.longitude);

        if (!isFinite(lat) || !isFinite(lng)) return;

        const prof = pMap[loc.id] || {};
        const pseudo = prof.pseudo || 'Conducteur';
        const plate = prof.owner_plate ? nPlate(prof.owner_plate) : '';

        if (plate && S.blocked.includes(plate)) return;

        let dist = null;
        if (S.myLat !== null && S.myLng !== null) {
          dist = km(S.myLat, S.myLng, lat, lng);
          if (dist > S.radiusKm) return;
        }

        const icon = L.divIcon({
          html: '<div style="width:13px;height:13px;border-radius:50%;background:#00ffb3;border:3px solid rgba(0,255,179,.35);box-shadow:0 0 10px rgba(0,255,179,.55)"></div>',
          iconSize: [13, 13],
          iconAnchor: [6, 6],
          className: ''
        });

        const distTxt = dist === null ? '' : '<div class="pps">Distance : ' + esc(dist.toFixed(1)) + ' km</div>';

        const mkr = L.marker([lat, lng], { icon }).addTo(S.map);

        mkr.bindPopup(
          '<div class="pp">' + esc(plate) + '</div>' +
          '<div class="pps">' + esc(pseudo) + ' · ' + esc(relTime(loc.updated_at)) + '</div>' +
          distTxt +
          '<button class="ppb" data-plate="' + esc(plate) + '">Contacter ce véhicule</button>'
        );

        mkr.on('popupopen', () => {
          const pop = mkr.getPopup().getElement();
          if (!pop) return;

          const pb = pop.querySelector('.ppb');
          if (!pb) return;

          pb.onclick = () => {
            App._selPlate(pb.dataset.plate);
            mkr.closePopup();
          };
        });

        S.otherMkrs.push(mkr);
        shown++;
      });

      if (!shown) {
        toast('Aucun conducteur dans le rayon choisi.');
        return;
      }

      toast(shown + ' conducteur' + (shown > 1 ? 's' : '') + ' affiché' + (shown > 1 ? 's' : '') + '.', 'ok');
    } finally {
      S.loadingOthers = false;
      btn.disabled = false;
      btn.textContent = '👥 Conducteurs';
    }
  },

  _selPlate(plate) {
    const p = nPlate(plate);

    if (!p) return;

    if (S.blocked.includes(p)) {
      toast('Cette plaque est bloquée.', 'bad');
      return;
    }

    S.selPlate = p;

    const el = document.getElementById('iTarget');
    el.value = p;

    mi('iTarget', true);
    hint('hTarget', 'ok', 'Véhicule sélectionné ✓');

    document.getElementById('iMsg').focus();
    document.querySelector('.panel').scrollTo({ top: 0, behavior: 'smooth' });
  },

  clearMsg() {
    const m = document.getElementById('iMsg');
    if (m) m.value = '';
    ch('hMsg');
    setReq('', '');
  },

  async sendMsg() {
    ch('hTarget', 'hMsg');
    setReq('', '');

    if (!canSendNow()) {
      setReq('Trop de messages envoyés. Attends un peu.', 'err');
      return;
    }

    const plateRaw = document.getElementById('iTarget').value.trim();
    const msg = document.getElementById('iMsg').value.trim();

    let fail = false;

    if (!plateRaw) {
      hint('hTarget', 'err', 'Requis.');
      fail = true;
    } else if (!vPlate(nPlate(plateRaw))) {
      hint('hTarget', 'err', 'Format : AB-123-CD');
      fail = true;
    }

    if (!msg) {
      hint('hMsg', 'err', 'Ajoute un message.');
      fail = true;
    }

    if (fail) return;

    const plate = nPlate(plateRaw);

    if (S.blocked.includes(plate)) {
      setReq('Tu as bloqué cette plaque.', 'err');
      return;
    }

    if (!S.selPlate && !confirm('Envoyer une demande de contact à ' + plate + ' ?')) return;

    sBtn('sendBtn', true, 'Envoyer →');

    try {
      const { data: ud } = await sb.auth.getUser();
      const user = ud?.user;

      if (!user) {
        setReq('Tu dois être connecté.', 'err');
        return;
      }

      S.uid = user.id;

      const { data: target, error: te } = await sb.from('profiles').select('id').eq('owner_plate', plate).maybeSingle();

      if (te || !target?.id) {
        setReq('Aucun utilisateur trouvé avec cette plaque.', 'err');
        return;
      }

      if (target.id === user.id) {
        setReq("Tu ne peux pas t'envoyer un message à toi-même.", 'err');
        return;
      }

      S.selPlate = plate;

      const { data: ex1 } = await sb.from('messages').select('status').eq('sender_id', user.id).eq('receiver_id', target.id).eq('target_plate', plate);
      const { data: ex2 } = await sb.from('messages').select('status').eq('sender_id', target.id).eq('receiver_id', user.id).eq('target_plate', plate);

      const rows = [...(ex1 || []), ...(ex2 || [])];
      const hasAcc = rows.some(m => m.status === 'accepted');
      const hasPend = rows.some(m => m.status === 'pending');

      if (hasPend && !hasAcc) {
        setReq('Demande déjà envoyée, en attente de réponse.', 'ok');
        await App.loadMsgs();
        return;
      }

      const { error } = await sb.from('messages').insert({
        sender_id: user.id,
        receiver_id: target.id,
        target_plate: plate,
        message: msg,
        status: hasAcc ? 'accepted' : 'pending'
      });

      if (error) {
        console.error(error);
        setReq("Erreur lors de l'envoi.", 'err');
        return;
      }

      document.getElementById('iMsg').value = '';
      ch('hMsg');

      setReq(hasAcc ? '✅ Message envoyé' : "⏳ Demande envoyée, en attente d'acceptation", 'ok');
      await App.loadMsgs();
    } finally {
      sBtn('sendBtn', false, 'Envoyer →');
    }
  },

  async _startMsgs() {
    await App.loadMsgs();
    await App._subMsgs();
  },

  async loadMsgs() {
    const box = document.getElementById('chatBox');

    if (!box) return;

    const { data: ud } = await sb.auth.getUser();
    const user = ud?.user;

    if (!user) {
      box.innerHTML = '<div class="cempty">Connecte-toi pour voir les messages.</div>';
      return;
    }

    S.uid = user.id;

    const { data, error } = await sb.from('messages')
      .select('*')
      .or('sender_id.eq.' + user.id + ',receiver_id.eq.' + user.id)
      .neq('status', 'rejected')
      .order('created_at', { ascending: true })
      .limit(150);

    if (error) {
      console.error(error);
      box.innerHTML = '<div class="cempty">Erreur de chargement.</div>';
      return;
    }

    let rows = data || [];
    rows = rows.filter(m => !S.blocked.includes(nPlate(m.target_plate)));

    App.renderConversations(rows);

    if (S.conversationFilter !== 'all') {
      rows = rows.filter(m => nPlate(m.target_plate) === S.conversationFilter);
    }

    if (!rows.length) {
      box.innerHTML = '<div class="cempty">Aucun message pour le moment.</div>';
      return;
    }

    box.innerHTML = rows.map(m => App._buildMsg(m, user.id)).join('');
    box.scrollTop = box.scrollHeight;
  },

  renderConversations(rows) {
    const chat = document.getElementById('chatBox');
    if (!chat) return;

    let bar = document.getElementById('convbar');
    if (!bar) {
      chat.insertAdjacentHTML('beforebegin', '<div id="convbar" class="convbar"></div>');
      bar = document.getElementById('convbar');
    }

    const plates = [...new Set((rows || []).map(m => nPlate(m.target_plate)).filter(Boolean))];

    bar.innerHTML =
      '<button class="convpill ' + (S.conversationFilter === 'all' ? 'on' : '') + '" onclick="App.setConversation(\'all\')">Toutes</button>' +
      plates.map(p =>
        '<button class="convpill ' + (S.conversationFilter === p ? 'on' : '') + '" onclick="App.setConversation(\'' + jsStr(p) + '\')">' + esc(p) + '</button>'
      ).join('');
  },

  setConversation(p) {
    S.conversationFilter = p || 'all';
    App.loadMsgs();
  },

  _buildMsg(msg, myId) {
    const sent = msg.sender_id === myId;
    const status = msg.status || 'accepted';
    const plateRaw = nPlate(msg.target_plate || '');
    const plate = esc(plateRaw);
    const text = esc(msg.message || '');
    const time = msg.created_at
      ? new Date(msg.created_at).toLocaleString('fr-FR', {
          day: '2-digit',
          month: '2-digit',
          hour: '2-digit',
          minute: '2-digit'
        })
      : '';

    const lbl = sent
      ? (status === 'pending' ? "⏳ En attente d'acceptation" : '📤 Envoyé → ' + plate)
      : (status === 'pending' ? '📩 Demande de contact' : '🚗 Message reçu');

    let acts = '';

    if (!sent && msg.receiver_id === myId && status === 'pending') {
      acts =
        '<div class="macts">' +
          '<button class="abtn2 acc" onclick="App._accept(\'' + jsStr(msg.id) + '\',\'' + jsStr(msg.sender_id) + '\',\'' + jsStr(msg.target_plate || '') + '\')">✅ Accepter</button>' +
          '<button class="abtn2 rej" onclick="App._reject(\'' + jsStr(msg.id) + '\')">❌ Refuser</button>' +
        '</div>';
    }

    let rbox = '';

    if (!sent && status === 'accepted') {
      const tid = 'ta_' + String(msg.id).replace(/[^a-zA-Z0-9_-]/g, '');
      const bid = 'tb_' + String(msg.id).replace(/[^a-zA-Z0-9_-]/g, '');

      rbox =
        '<div class="rbox">' +
          '<textarea id="' + esc(tid) + '" placeholder="Votre réponse…" rows="2"></textarea>' +
          '<button id="' + esc(bid) + '" class="rbox-btn" onclick="App._reply(\'' + jsStr(msg.id) + '\',\'' + jsStr(msg.sender_id) + '\',\'' + jsStr(msg.target_plate || '') + '\',\'' + jsStr(tid) + '\',\'' + jsStr(bid) + '\')">Répondre →</button>' +
        '</div>';
    }

    const mini =
      '<div class="mini-actions">' +
        '<button class="abtn2 rej" onclick="App.blockPlate(\'' + jsStr(plateRaw) + '\')">🚫 Bloquer</button>' +
        '<button class="abtn2 rej" onclick="App.reportPlate(\'' + jsStr(plateRaw) + '\')">⚠️ Signaler</button>' +
      '</div>';

    return (
      '<div class="msg ' + (sent ? 'sent' : 'recv') + '">' +
        '<div class="mlbl ' + (sent ? '' : 'r') + '">' + lbl + '</div>' +
        '<div class="mbody"><strong>' + plate + '</strong> — ' + text + '</div>' +
        acts +
        rbox +
        mini +
        '<div class="mtime">' + esc(time) + '</div>' +
      '</div>'
    );
  },

  async _accept(id, senderId, plate) {
    try {
      const { data: ud } = await sb.auth.getUser();
      const user = ud?.user;

      if (!user) return;

      await sb.from('messages')
        .update({ status: 'accepted' })
        .eq('id', id)
        .eq('receiver_id', user.id);

      await sb.from('messages').insert({
        sender_id: user.id,
        receiver_id: senderId,
        target_plate: plate,
        message: 'Votre demande de contact a été acceptée. Vous pouvez maintenant échanger.',
        status: 'accepted'
      });

      S.selPlate = nPlate(plate);
      document.getElementById('iTarget').value = S.selPlate;

      setReq('✅ Demande acceptée', 'ok');
      toast('✅ Demande acceptée', 'ok');
      beep();

      await App.loadMsgs();
    } catch (e) {
      console.error(e);
      toast('Erreur lors de l’acceptation.', 'bad');
    }
  },

  async _reject(id) {
    try {
      const { data: ud } = await sb.auth.getUser();
      const user = ud?.user;

      if (!user) return;

      await sb.from('messages')
        .update({ status: 'rejected' })
        .eq('id', id)
        .eq('receiver_id', user.id);

      setReq('Demande refusée.', '');
      toast('Demande refusée.');

      await App.loadMsgs();
    } catch (e) {
      console.error(e);
      toast('Erreur lors du refus.', 'bad');
    }
  },

  async _reply(msgId, receiverId, plate, taId, btnId) {
    const ta = document.getElementById(taId);

    if (!ta) return;

    const text = ta.value.trim();

    if (!text) {
      ta.style.borderColor = 'var(--red)';
      setTimeout(() => {
        ta.style.borderColor = '';
      }, 1500);
      return;
    }

    if (!canSendNow()) {
      toast('Trop de messages envoyés. Attends un peu.', 'bad');
      return;
    }

    const btn = document.getElementById(btnId);

    if (btn) {
      btn.disabled = true;
      btn.textContent = 'Envoi…';
    }

    try {
      const { data: ud } = await sb.auth.getUser();
      const user = ud?.user;

      if (!user) return;

      const { error } = await sb.from('messages').insert({
        sender_id: user.id,
        receiver_id: receiverId,
        target_plate: plate,
        message: text,
        status: 'accepted'
      });

      if (error) {
        console.error(error);
        toast('Erreur envoi réponse.', 'bad');
        return;
      }

      ta.value = '';
      toast('✅ Réponse envoyée', 'ok');

      await App.loadMsgs();
    } finally {
      if (btn) {
        btn.disabled = false;
        btn.textContent = 'Répondre →';
      }
    }
  },

  blockPlate(plate) {
    const p = nPlate(plate);
    if (!p) return;
    if (!confirm('Bloquer la plaque ' + p + ' ? Ses messages seront masqués sur cet appareil.')) return;

    if (!S.blocked.includes(p)) S.blocked.push(p);
    localStorage.setItem('ic_blocked', JSON.stringify(S.blocked));

    toast('Plaque bloquée : ' + p, 'ok');
    App.loadMsgs();
    App.loadOthers();
  },

  async reportPlate(plate) {
    const p = nPlate(plate);
    if (!p) return;

    const reason = prompt('Raison du signalement pour ' + p + ' :');
    if (!reason) return;

    try {
      const { data: ud } = await sb.auth.getUser();
      const user = ud?.user;

      await sb.from('reports').insert({
        reporter_id: user?.id || null,
        plate: p,
        reason: reason.slice(0, 500),
        created_at: new Date().toISOString()
      });

      toast('Signalement envoyé.', 'ok');
    } catch (e) {
      console.warn(e);
      toast('Signalement enregistré localement. Crée une table reports pour l’enregistrer en base.', 'bad');
    }
  },

  async _subMsgs() {
    const { data: ud } = await sb.auth.getUser();
    const user = ud?.user;

    if (!user) return;

    S.uid = user.id;

    if (S.chMsg) {
      await sb.removeChannel(S.chMsg);
      S.chMsg = null;
    }

    S.chMsg = sb.channel('ic_msg_' + user.id)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, payload => {
        const msg = payload.new || payload.old;

        if (!msg) return;
        if (msg.sender_id !== user.id && msg.receiver_id !== user.id) return;
        if (S.blocked.includes(nPlate(msg.target_plate))) return;

        if (payload.eventType === 'INSERT' && msg.receiver_id === user.id) {
          if (msg.status === 'pending') {
            toast('📩 Nouvelle demande de contact !', 'ok');
            App.showBadge();
            beep();
          } else if (String(msg.message || '').includes('acceptée')) {
            toast('✅ Ta demande a été acceptée !', 'ok');
            beep();
          } else {
            toast('💬 Nouveau message reçu', 'ok');
            App.showBadge();
            beep();
          }
        }

        App.loadMsgs();
      })
      .subscribe();
  },

  async _subLocs() {
    if (S.chLoc) {
      await sb.removeChannel(S.chLoc);
      S.chLoc = null;
    }

    S.chLoc = sb.channel('ic_loc')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'user_locations' }, () => {
        if (document.getElementById('sm').classList.contains('active')) App.loadOthers();
      })
      .subscribe();
  },

  showBadge() {
    document.getElementById('msgBadge')?.classList.add('show');
  },

  hideBadge() {
    document.getElementById('msgBadge')?.classList.remove('show');
  },

  openLegal() {
    document.getElementById('legalModal')?.classList.add('show');
  },

  closeLegal() {
    document.getElementById('legalModal')?.classList.remove('show');
  },

  async logout() {
    if (!confirm('Veux-tu vraiment te déconnecter ? Ta position sera supprimée de la carte.')) return;

    if (S.watchId !== null) {
      navigator.geolocation.clearWatch(S.watchId);
      S.watchId = null;
    }

    await App.deleteMyLocation();

    if (S.chMsg) {
      await sb.removeChannel(S.chMsg);
      S.chMsg = null;
    }

    if (S.chLoc) {
      await sb.removeChannel(S.chLoc);
      S.chLoc = null;
    }

    await sb.auth.signOut();

    location.href = CFG.site;
  },

  sos() {
    const ok1 = confirm('Appel d’urgence 112. Continuer uniquement en cas de vraie urgence ?');
    if (!ok1) return;

    const ok2 = confirm('Confirmation finale : appeler le 112 maintenant ?');
    if (ok2) window.location.href = 'tel:112';
  }
};

sb.auth.onAuthStateChange((event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    S.sessionDone = false;
    S.uid = session?.user?.id || null;
    show('sr');
    return;
  }

  if (event === 'SIGNED_IN' && session) {
    if (S.sessionDone) return;

    S.uid = session.user.id;
    S.sessionDone = true;

    setTimeout(() => App._afterAuth(), 0);
    return;
  }

  if (event === 'SIGNED_OUT') {
    S.sessionDone = false;
    S.uid = null;
    S.selPlate = null;

    if (S.watchId !== null) {
      navigator.geolocation.clearWatch(S.watchId);
      S.watchId = null;
    }

    if (S.chMsg) {
      try {
        sb.removeChannel(S.chMsg);
      } catch (e) {}
      S.chMsg = null;
    }

    if (S.chLoc) {
      try {
        sb.removeChannel(S.chLoc);
      } catch (e) {}
      S.chLoc = null;
    }

    show('sw');
  }
});

async function boot() {
  installPwa();
  injectExtraUi();

  const frag = (window.location.hash || '') + (window.location.search || '');

  if (frag.toLowerCase().includes('type=recovery')) {
    show('sr');
    return;
  }

  const { data: sd, error: se } = await sb.auth.getSession();

  if (se) {
    console.error('boot getSession:', se);
    show('sw');
    return;
  }

  const session = sd?.session;

  if (!session) {
    show('sw');
    return;
  }

  S.uid = session.user.id;
  S.sessionDone = true;

  await App._afterAuth();
}

bindInputs();
boot();
</script>

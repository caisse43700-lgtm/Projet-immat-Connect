name: Tests E2E (Playwright)

on:
  push:
  pull_request:

jobs:
  e2e:
    name: Smoke tests navigateur
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Installer les dépendances
        run: npm ci

      - name: Installer Chromium Playwright
        run: npx playwright install chromium --with-deps

      - name: Exécuter les smoke tests
        run: npm run test:e2e
        env:
          TEST_USER_A_EMAIL: ${{ secrets.TEST_USER_A_EMAIL }}
          TEST_USER_A_PASSWORD: ${{ secrets.TEST_USER_A_PASSWORD }}
          TEST_USER_B_EMAIL: ${{ secrets.TEST_USER_B_EMAIL }}
          TEST_USER_B_PASSWORD: ${{ secrets.TEST_USER_B_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Rapport Playwright si échec
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

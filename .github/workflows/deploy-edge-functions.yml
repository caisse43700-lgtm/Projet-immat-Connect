name: Deploy Edge Functions

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply pending migrations
        run: supabase db push --project-ref vemgdkkbldgyvaisudkd
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Deploy delete-account
        run: supabase functions deploy delete-account --project-ref vemgdkkbldgyvaisudkd
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy export-user-data
        run: supabase functions deploy export-user-data --project-ref vemgdkkbldgyvaisudkd
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy submit-rating
        run: supabase functions deploy submit-rating --project-ref vemgdkkbldgyvaisudkd
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy send-push-notification
        run: supabase functions deploy send-push-notification --project-ref vemgdkkbldgyvaisudkd
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy immat-brain-dialog
        run: supabase functions deploy immat-brain-dialog --project-ref vemgdkkbldgyvaisudkd
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

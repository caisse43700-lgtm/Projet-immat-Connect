name: Déployer Edge Functions Supabase

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    name: Déployer sur Supabase
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Déployer immat-brain-dialog
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy immat-brain-dialog \
            --project-ref vemgdkkbldgyvaisudkd

name: E2E Diagnostics

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  e2e-diagnostics:
    name: Playwright evidence collection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Chromium
        run: npx playwright install chromium

      - name: Run unit and diagnostic tests
        run: npm test

      - name: Run Playwright with evidence
        id: playwright
        continue-on-error: true
        env:
          CI: true
        run: |
          mkdir -p diagnostic-artifacts
          npx playwright test --reporter=list,html --trace=retain-on-failure --screenshot=only-on-failure 2>&1 | tee diagnostic-artifacts/playwright-output.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Build OBD incident metadata
        if: always()
        run: |
          mkdir -p diagnostic-artifacts
          cat > diagnostic-artifacts/metadata.json <<EOF
          {
            "workflow": "E2E Diagnostics",
            "job": "Playwright evidence collection",
            "commit": "${GITHUB_SHA}",
            "ref": "${GITHUB_REF}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_attempt": "${GITHUB_RUN_ATTEMPT}",
            "run_url": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}",
            "artifact_name": "obd-e2e-evidence",
            "playwright_exit_code": "${{ steps.playwright.outputs.exit_code }}",
            "generated_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Upload OBD evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: obd-e2e-evidence
          path: |
            diagnostic-artifacts/
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Create OBD incident issue
        if: steps.playwright.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `OBD Incident: E2E failure ${process.env.GITHUB_SHA.slice(0, 7)} run ${process.env.GITHUB_RUN_ID}`;
            const body = [
              '## OBD Incident',
              '',
              'Playwright E2E diagnostics failed and evidence was uploaded automatically.',
              '',
              `- Workflow: E2E Diagnostics`,
              `- Run ID: ${process.env.GITHUB_RUN_ID}`,
              `- Run URL: ${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
              `- Commit: ${process.env.GITHUB_SHA}`,
              `- Ref: ${process.env.GITHUB_REF}`,
              `- Artifact: obd-e2e-evidence`,
              '',
              '### Investigation order',
              '1. Open the workflow run.',
              '2. Download artifact `obd-e2e-evidence`.',
              '3. Inspect `diagnostic-artifacts/playwright-output.log`.',
              '4. Inspect `playwright-report/` and `test-results/`.',
              '5. Identify the first broken step before fixing symptoms.',
              '',
              '### OBD classification',
              '- Category: e2e',
              '- Chain candidate: APP_BOOT_FLOW',
              '- Evidence status: uploaded',
              '- Root cause: pending analysis'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['obd-incident', 'e2e', 'needs-triage']
            });

      - name: Fail if Playwright failed
        if: steps.playwright.outputs.exit_code != '0'
        run: exit 1
